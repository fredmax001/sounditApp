# ============================================================
# SOUND IT — CHINA SERVER NGINX CONFIGURATION
# Server: Alibaba Cloud ECS (47.100.211.43)
# Domain: sounditent.cn
# Role: China Frontend + API Proxy + Media Proxy
# Backend: Proxies ALL API calls to main server (72.62.254.251)
# Database: NO local database — all data via API proxy
# ============================================================

# Upstream to main server API
upstream soundit_main_api {
    server 72.62.254.251:443;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# Rate limiting for China region
limit_req_zone $binary_remote_addr zone=cn_auth_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=cn_api_limit:50m rate=100r/s;

# Media cache path (must be in http context)
proxy_cache_path /var/cache/nginx/soundit_media levels=1:2 keys_zone=soundit_media:100m max_size=5g inactive=7d use_temp_path=off;

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name sounditent.cn www.sounditent.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# --- HTTPS China Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sounditent.cn www.sounditent.cn;

    # SSL Certificates
    # Option A: Let's Encrypt (recommended if domain DNS points to this server)
    ssl_certificate /etc/letsencrypt/live/sounditent.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sounditent.cn/privkey.pem;

    # Option B: Alibaba Cloud SSL (if using Alibaba certificate service)
    # ssl_certificate /path/to/alibaba/cert.pem;
    # ssl_certificate_key /path/to/alibaba/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/soundit_cn_access.log combined buffer=64k flush=5s;
    error_log /var/log/nginx/soundit_cn_error.log warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Body size
    client_max_body_size 50M;

    # ============================================================
    # API PROXY — Forward ALL API calls to main server
    # This is the CRITICAL path: China frontend → China nginx → Main API
    # ============================================================
    location /api/ {
        limit_req zone=cn_api_limit burst=100 nodelay;

        # CORS preflight handling
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://sounditent.cn" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin "https://sounditent.cn" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass https://soundit_main_api/api/;
        proxy_ssl_server_name on;
        proxy_ssl_name sounditent.com;
        proxy_ssl_verify off;  # Self-signed or internal certs may need this

        proxy_http_version 1.1;
        proxy_set_header Host sounditent.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;

        # Error handling — if main server is down, return custom error
        proxy_intercept_errors on;
        error_page 502 503 504 = @maintenance;
    }

    # Auth endpoints with stricter rate limiting
    location /api/auth/ {
        limit_req zone=cn_auth_limit burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://sounditent.cn" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin "https://sounditent.cn" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass https://soundit_main_api/api/auth/;
        proxy_ssl_server_name on;
        proxy_ssl_name sounditent.com;
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Host sounditent.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;

        proxy_intercept_errors on;
        error_page 502 503 504 = @maintenance;
    }

    # Health check — proxied to main server
    location /health {
        proxy_pass https://soundit_main_api/health;
        proxy_ssl_server_name on;
        proxy_ssl_name sounditent.com;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ============================================================
    # MEDIA PROXY — Serve uploads from main server
    # Option 1: Proxy all media (simpler, but adds latency)
    # Option 2: Sync media to China (better performance, more complex)
    # Current: Proxy with caching
    # ============================================================
    location ^~ /static/uploads/ {
        proxy_pass https://soundit_main_api/static/uploads/;
        proxy_ssl_server_name on;
        proxy_ssl_name sounditent.com;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Cache media files locally for 1 hour
        proxy_cache soundit_media;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;

        expires 1h;
        add_header Cache-Control "public" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ^~ /uploads/ {
        proxy_pass https://soundit_main_api/uploads/;
        proxy_ssl_server_name on;
        proxy_ssl_name sounditent.com;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_cache soundit_media;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        expires 1h;
        add_header Cache-Control "public" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Static files from main server (optional — can be served locally instead)
    location ^~ /static/ {
        proxy_pass https://soundit_main_api/static/;
        proxy_ssl_server_name on;
        proxy_ssl_name sounditent.com;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_cache soundit_media;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        expires 1h;
        add_header Cache-Control "public" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ============================================================
    # CHINA FRONTEND — React SPA static build
    # Deploy the same build as main server (or China-optimized build)
    # ============================================================
    location = /index.html {
        root /var/www/soundit/app/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
        try_files /index.html =404;
    }

    location = /site.webmanifest {
        root /var/www/soundit/app/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
        try_files /site.webmanifest =404;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm)$ {
        root /var/www/soundit/app/dist;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # SPA fallback
    location / {
        root /var/www/soundit/app/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Maintenance page fallback
    location @maintenance {
        return 503 "{\"status\":\"maintenance\",\"message\":\"Service temporarily unavailable. Please try again shortly.\"}";
        add_header Content-Type application/json;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
